<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>越洋 ❤️ 美琳 的浪漫笔记</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Microsoft YaHei',sans-serif; }
    body {
      background: linear-gradient(135deg, #fce7f3 0%, #ede9fe 100%);
      color:#334155; height:100vh; overflow:hidden;
    }
    .back-btn {
      position:absolute; top:16px; left:16px; padding:10px 18px;
      background: rgba(255,255,255,0.7); color:#ec4899;
      border:1px solid rgba(236,72,153,0.3); border-radius:8px; cursor:pointer;
      transition: all 0.3s; z-index:100; font-weight:bold;
    }
    .back-btn:hover { background:#ec4899; color:white; transform:translateX(-2px); }
    .main-container { display:flex; height:100vh; }

    /* 左侧控制面板 */
    .control-panel {
      width:300px; background: rgba(255,255,255,0.6);
      padding:24px; padding-top:80px;
      display:flex; flex-direction:column; gap:20px;
      box-shadow:4px 0 15px rgba(236,72,153,0.1);
      backdrop-filter:blur(10px); border-right:1px solid rgba(236,72,153,0.2);
    }
    .panel-title { font-size:24px; font-weight:bold; color:#ec4899; text-align:center; }
    #newNote { width:100%; height:80px; padding:10px; border-radius:8px; border:1px solid #ec4899; font-size:14px; resize:none; }
    #addNoteBtn {
      padding:10px; font-weight:bold; border-radius:8px;
      background: linear-gradient(to right,#f472b6,#fb923c); color:white;
      border:none; cursor:pointer; transition: all 0.3s;
    }
    #addNoteBtn:hover { transform: translateY(-2px); }

    .status-text { font-size:14px; color:#64748b; text-align:center; font-style:italic; }
    .nav-group { display:flex; flex-direction:column; gap:10px; margin-top:20px; border-top:1px dashed rgba(236,72,153,0.3); padding-top:20px; }
    .nav-btn {
      width:100%; padding:12px; border-radius:8px; border:1px solid rgba(236,72,153,0.2);
      background: rgba(255,255,255,0.5); color:#7c3aed; font-weight:bold; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px; transition: all 0.2s;
    }
    .nav-btn:hover { background:#7c3aed; color:white; transform:scale(1.02); }

    /* 笔记显示区域 */
    .notes-container { flex:1; padding:40px; padding-top:80px; overflow-y:auto; scroll-behavior:smooth; }
    .section-title { font-size:18px; font-weight:bold; color:#7c3aed; margin-bottom:16px; display:flex; align-items:center; gap:8px; padding-bottom:6px; border-bottom:2px solid rgba(124,58,237,0.2); }
    .note-card {
      background:white; padding:12px; border-radius:12px; margin-bottom:16px;
      box-shadow:0 4px 10px rgba(236,72,153,0.1); transition: all 0.3s; border:1px solid rgba(236,72,153,0.1);
    }
    .note-card:hover { transform:scale(1.03); box-shadow:0 10px 20px rgba(236,72,153,0.15); }
    .note-card small { color:#94a3b8; display:block; margin-top:6px; }
    .note-card button { margin-right:6px; cursor:pointer; font-size:12px; background:#f472b6; border:none; border-radius:6px; padding:4px 8px; color:white; transition: all 0.2s; }
    .note-card button:hover { background:#ec4899; }
  </style>
</head>
<body>

  <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> 返回主页</button>

  <div class="main-container">
    <div class="control-panel">
      <h3 class="panel-title">💌 我们的浪漫笔记</h3>
      <textarea id="newNote" placeholder="写下你的小秘密..."></textarea>
      <button id="addNoteBtn">✏️ 发布笔记</button>
      <div class="status-text" id="statusText">等待记录美好时刻...</div>

      <div class="nav-group">
        <button class="nav-btn" onclick="document.getElementById('notesSection').scrollIntoView();">
          <i class="fas fa-sticky-note"></i> 笔记列表
        </button>
      </div>
    </div>

    <div class="notes-container">
      <div class="section-block" id="notesSection">
        <h4 class="section-title"><i class="fas fa-sticky-note"></i> 📖 所有笔记</h4>
        <div id="notesList"></div>
      </div>
    </div>
  </div>

  <script type="module" src="notes.js"></script>
</body>
</html>
