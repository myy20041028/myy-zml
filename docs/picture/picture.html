<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>越洋 ❤️ 美琳 的浪漫相册</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
    body {
      background: linear-gradient(135deg, #fce7f3 0%, #ede9fe 100%);
      color: #334155;
      height: 100vh;
      overflow: hidden;
    }

    .back-btn {
      position: absolute; top: 16px; left: 16px; padding: 10px 18px;
      background: rgba(255, 255, 255, 0.7); color: #ec4899;
      border: 1px solid rgba(236, 72, 153, 0.3); border-radius: 8px;
      cursor: pointer; transition: all 0.3s; z-index: 100; font-weight: bold;
    }
    .back-btn:hover { background: #ec4899; color: white; transform: translateX(-2px); }

    .main-container { display: flex; height: 100vh; }

    /* 左侧控制面板 */
    .control-panel {
      width: 300px; background: rgba(255, 255, 255, 0.6);
      padding: 24px; padding-top: 80px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 4px 0 15px rgba(236, 72, 153, 0.1);
      backdrop-filter: blur(10px); border-right: 1px solid rgba(236, 72, 153, 0.2);
    }

    .panel-title { font-size: 24px; font-weight: bold; color: #ec4899; text-align: center; }

    #fileInput { display: none; }
    
    .upload-label {
      width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(to right, #f472b6, #fb923c); color: white;
      transition: all 0.3s; text-align: center;
      box-shadow: 0 4px 10px rgba(236, 72, 153, 0.2);
    }
    .upload-label:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(236, 72, 153, 0.4); }

    .status-text { font-size: 14px; color: #64748b; text-align: center; font-style: italic; }

    /* ✨ 新增：分类快速导航按钮样式 */
    .nav-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; border-top: 1px dashed rgba(236, 72, 153, 0.3); padding-top: 20px; }
    .nav-btn {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(236, 72, 153, 0.2);
      background: rgba(255,255,255,0.5); color: #7c3aed; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;
    }
    .nav-btn:hover { background: #7c3aed; color: white; transform: scale(1.02); }

    /* 右侧相册展示区域 */
    .album-container {
      flex: 1; padding: 40px; padding-top: 80px;
      overflow-y: auto; scroll-behavior: smooth; /* 让滚动变平滑 */
    }

    /* ✨ 新增：区域标题小浪漫样式 */
    .section-title {
      font-size: 18px; font-weight: bold; color: #7c3aed;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
      padding-bottom: 6px; border-bottom: 2px solid rgba(124, 58, 237, 0.2);
    }
    .section-block { margin-bottom: 40px; }

    /* 照片墙网格布局 */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .media-card {
      background: white; padding: 10px; border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(236, 72, 153, 0.1);
    }
    .media-card:hover { transform: scale(1.05) rotate(1.5deg); box-shadow: 0 10px 20px rgba(236,72,153,0.2); }

    .media-card img, .media-card video {
      width: 100%; height: 180px; object-fit: cover; border-radius: 8px;
    }

    .media-time { font-size: 12px; color: #94a3b8; margin-top: 8px; text-align: right; }
  </style>
</head>
<body>

  <button class="back-btn" id="backBtn">
    <i class="fas fa-arrow-left"></i> 返回主页
  </button>

  <div class="main-container">
    <div class="control-panel">
      <h3 class="panel-title">💝 我们的云相册</h3>
      
      <label for="fileInput" class="upload-label">
        <i class="fas fa-cloud-upload-alt"></i> 上传照片 / 视频
      </label>
      <input type="file" id="fileInput" accept="image/*,video/*">
      
      <div class="status-text" id="statusText">等待上传美好的瞬间...</div>

      <div class="nav-group">
        <button class="nav-btn" onclick="document.getElementById('imageSection').scrollIntoView();">
          <i class="fas fa-images"></i> 纯真照片流
        </button>
        <button class="nav-btn" onclick="document.getElementById('videoSection').scrollIntoView();">
          <i class="fas fa-film"></i> 动态视频集
        </button>
      </div>
    </div>

    <div class="album-container">
      
      <div class="section-block" id="imageSection">
        <h4 class="section-title"><i class="fas fa-images"></i> 📸 定格照片 ({num})</h4>
        <div class="photo-grid" id="imageGrid"></div>
      </div>

      <div class="section-block" id="videoSection">
        <h4 class
